<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Member Data | ASSIES Clubhouse</title>
    <meta name="description" content="ASSIES Clubhouseの隠しメンバーデータページです。" />
    <style>
      :root {
        --blue: #0472c8;
        --blue-dark: #003b82;
        --cyan: #59d9ff;
        --panel: rgba(242, 249, 255, 0.94);
        --line: #1174c2;
        --yellow: #ffd84e;
        --green: #71ef7b;
        --red: #ff5d6c;
        --orange: #ff9f22;
        --ink: #071b36;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(0, 88, 174, 0.9), rgba(45, 177, 255, 0.45) 42%, transparent 58%),
          url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=82")
            center / cover fixed;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px) 0 0 / 26px 26px,
          linear-gradient(rgba(255, 255, 255, 0.14) 0 1px, transparent 1px) 0 0 / 26px 26px;
        opacity: 0.4;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .screen {
        width: min(1500px, calc(100% - 28px));
        margin: 12px auto 22px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 18px;
        align-items: center;
        min-height: 86px;
        padding: 12px 28px;
        border-bottom: 5px solid #001e53;
        border-radius: 0 0 22px 22px;
        color: var(--white);
        background: linear-gradient(90deg, #004e9e, #02162f 52%, #006ab7);
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.18);
      }

      .badge {
        display: grid;
        place-items: center;
        width: 78px;
        aspect-ratio: 1;
        border: 4px solid #ffe386;
        border-radius: 22px;
        background: linear-gradient(145deg, #ffb829, #ff7e28);
        box-shadow: inset 0 -8px rgba(0, 0, 0, 0.15), 0 7px 0 rgba(0, 0, 0, 0.22);
        font-size: 38px;
        font-weight: 900;
        transform: rotate(-8deg);
      }

      .title {
        margin: 0;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1;
        text-shadow: 0 4px 0 rgba(0, 0, 0, 0.32);
      }

      .top-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: end;
        gap: 10px;
      }

      .top-button {
        min-width: 130px;
        padding: 12px 18px;
        border: 3px solid #002f70;
        border-radius: 12px;
        color: var(--white);
        background: linear-gradient(180deg, #20a5ee, #0755a3);
        box-shadow: inset 0 -5px rgba(0, 0, 0, 0.2);
        font-weight: 900;
        text-align: center;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin: 18px 0 10px;
      }

      .tab {
        min-width: 152px;
        padding: 11px 18px;
        border: 4px solid #d7ecff;
        border-bottom-color: #82c9f7;
        border-radius: 12px 12px 0 0;
        color: var(--white);
        background: linear-gradient(180deg, #0997e4, #0260ae);
        box-shadow: inset 0 -7px rgba(0, 0, 0, 0.16);
        font-size: 24px;
        font-weight: 900;
        cursor: pointer;
      }

      .tab[data-mode="pitch"] {
        background: linear-gradient(180deg, #dc2553, #9d183d);
      }

      .tab[data-mode="field"] {
        background: linear-gradient(180deg, #1fa1b8, #0a7287);
      }

      .tab[data-mode="futsal"] {
        background: linear-gradient(180deg, #24b653, #107531);
      }

      .tab[data-mode="other"] {
        background: linear-gradient(180deg, #cda023, #8a650c);
      }

      .tab.is-active {
        transform: translateY(5px);
        filter: brightness(1.1);
      }

      .main-grid {
        display: grid;
        grid-template-columns: 245px 1fr;
        gap: 12px;
        align-items: stretch;
      }

      .roster,
      .data-panel {
        border: 5px solid var(--blue-dark);
        border-radius: 14px;
        background: rgba(239, 248, 255, 0.95);
        box-shadow: 0 10px 0 rgba(0, 44, 95, 0.22);
      }

      .filter {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 18px;
        padding: 8px 12px;
        border-radius: 12px;
        color: var(--white);
        background: linear-gradient(180deg, #076fca, #064a91);
        font-size: 24px;
        font-weight: 900;
      }

      .member-list {
        display: grid;
        gap: 7px;
        max-height: 650px;
        padding: 0 18px 18px;
        overflow: auto;
      }

      .member-button {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        min-height: 58px;
        padding: 8px 12px;
        border: 4px solid #ffe181;
        border-radius: 12px;
        background: linear-gradient(90deg, var(--green) 0 45%, var(--yellow) 45%);
        box-shadow: inset 0 -7px rgba(214, 142, 0, 0.2);
        color: #050b13;
        font-size: 27px;
        font-weight: 900;
        cursor: pointer;
      }

      .member-button.is-active {
        border-color: #ff142d;
        box-shadow: inset 0 -7px rgba(214, 142, 0, 0.2), 0 0 0 5px rgba(255, 20, 45, 0.45);
      }

      .member-button small {
        padding: 3px 7px;
        border-radius: 999px;
        color: #004d95;
        background: rgba(255, 255, 255, 0.75);
        font-size: 13px;
      }

      .data-panel {
        padding: 20px;
      }

      .player-head {
        display: grid;
        grid-template-columns: 1fr 180px 1.3fr;
        gap: 14px;
        margin-bottom: 18px;
      }

      .name-card,
      .avatar-card,
      .record-card,
      .ability-row,
      .trait-cell,
      .note-box {
        border: 4px solid #c7ddf5;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: inset 0 -5px rgba(24, 124, 202, 0.08);
      }

      .name-card {
        display: grid;
        gap: 10px;
        align-content: center;
        padding: 14px;
      }

      .player-name {
        display: grid;
        grid-template-columns: 1fr 70px;
        align-items: center;
        min-height: 60px;
        border-radius: 10px;
        overflow: hidden;
        background: linear-gradient(90deg, #ffe64f, #ffca30);
        font-size: 42px;
        font-weight: 900;
        text-align: center;
      }

      .number {
        display: grid;
        place-items: center;
        height: 100%;
        border-left: 4px solid #ffffff;
        color: #075eb2;
        background: rgba(255, 255, 255, 0.84);
      }

      .meta-line {
        display: grid;
        grid-template-columns: 120px 1fr;
        align-items: center;
        gap: 10px;
        min-height: 46px;
      }

      .meta-label,
      .ability-label {
        display: grid;
        place-items: center;
        min-height: 36px;
        border: 2px solid #c7ddf5;
        border-radius: 999px;
        color: #0971c7;
        background: #f7fbff;
        font-weight: 900;
      }

      .meta-value {
        color: #096dbd;
        font-size: 28px;
        font-weight: 900;
      }

      .avatar-card {
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .avatar {
        position: relative;
        width: 120px;
        aspect-ratio: 1;
      }

      .head {
        position: absolute;
        inset: 30px 16px 9px;
        border: 4px solid #1a2a35;
        border-radius: 44% 44% 40% 40%;
        background: #ffd2a7;
      }

      .cap {
        position: absolute;
        inset: 10px 9px auto;
        height: 42px;
        border: 4px solid #1a2a35;
        border-radius: 55px 55px 18px 18px;
        background: var(--avatar-color, #111317);
      }

      .cap::after {
        content: "";
        position: absolute;
        right: -22px;
        bottom: 4px;
        width: 44px;
        height: 15px;
        border: 4px solid #1a2a35;
        border-radius: 999px;
        background: inherit;
      }

      .eye {
        position: absolute;
        top: 35px;
        width: 8px;
        height: 14px;
        border-radius: 999px;
        background: #111317;
      }

      .eye.left {
        left: 28px;
      }

      .eye.right {
        right: 28px;
      }

      .record-card {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .record-line {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 10px;
        align-items: center;
        color: #096dbd;
        font-size: 28px;
        font-weight: 900;
      }

      .body-grid {
        display: grid;
        grid-template-columns: 410px 1fr;
        gap: 14px;
      }

      .abilities {
        display: grid;
        gap: 8px;
      }

      .ability-row {
        display: grid;
        grid-template-columns: 135px 58px 1fr 62px;
        gap: 10px;
        align-items: center;
        min-height: 58px;
        padding: 8px 12px;
      }

      .rank {
        font-size: 38px;
        line-height: 1;
        font-weight: 900;
        text-align: center;
        -webkit-text-stroke: 2px #ffffff;
      }

      .rank.S,
      .rank.A {
        color: #ed2453;
      }

      .rank.B {
        color: #1fcf4c;
      }

      .rank.C {
        color: #ff9d00;
      }

      .rank.D {
        color: #2b9bff;
      }

      .rank.E,
      .rank.F {
        color: #6b7b8a;
      }

      .bar {
        height: 18px;
        border: 2px solid #a9d7f4;
        border-radius: 999px;
        background: #eefaff;
        overflow: hidden;
      }

      .bar span {
        display: block;
        width: var(--score);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #4bd9ff, var(--rank-color, #ff9d00));
      }

      .score {
        color: #096dbd;
        font-size: 32px;
        font-weight: 900;
        text-align: right;
      }

      .traits {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: minmax(54px, auto);
        gap: 7px;
      }

      .trait-cell {
        display: grid;
        place-items: center;
        min-height: 54px;
        padding: 6px;
        color: #0872c5;
        background: linear-gradient(180deg, #e9fbff, #c5f2ff);
        font-size: 23px;
        font-weight: 900;
        text-align: center;
      }

      .trait-cell.hot {
        color: #e10018;
        background: linear-gradient(180deg, #fff0f0, #ffd1d1);
      }

      .trait-cell.gold {
        color: #8b5c00;
        background: linear-gradient(180deg, #fff7cd, #ffe47a);
      }

      .note-box {
        margin-top: 14px;
        padding: 18px;
        color: #096dbd;
        font-size: 24px;
        font-weight: 900;
      }

      .helpbar {
        margin-top: 18px;
        padding: 14px 28px;
        border: 4px solid #ba8b25;
        border-radius: 999px;
        color: var(--white);
        background: linear-gradient(180deg, #0e2336, #020710);
        box-shadow: inset 0 6px rgba(255, 255, 255, 0.2);
        font-size: 28px;
        font-weight: 900;
      }

      @media (max-width: 1180px) {
        .main-grid,
        .body-grid,
        .player-head {
          grid-template-columns: 1fr;
        }

        .member-list {
          grid-template-columns: repeat(2, 1fr);
          max-height: none;
        }
      }

      @media (max-width: 720px) {
        .topbar {
          grid-template-columns: 1fr;
          border-radius: 0 0 18px 18px;
        }

        .badge {
          width: 58px;
        }

        .tabs,
        .top-actions {
          justify-content: start;
        }

        .tab {
          min-width: 0;
          flex: 1 1 150px;
          font-size: 18px;
        }

        .member-list,
        .traits {
          grid-template-columns: 1fr;
        }

        .ability-row,
        .record-line,
        .meta-line {
          grid-template-columns: 1fr;
        }

        .helpbar {
          border-radius: 18px;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="screen">
      <header class="topbar">
        <div class="badge">A</div>
        <h1 class="title">メンバーデータ</h1>
        <div class="top-actions">
          <a class="top-button" href="index.html">戻る</a>
          <a class="top-button" href="index.html#join">参加</a>
        </div>
      </header>

      <nav class="tabs" aria-label="能力カテゴリ">
        <button class="tab is-active" type="button" data-mode="player">選手能力</button>
        <button class="tab" type="button" data-mode="pitch">野球 投手</button>
        <button class="tab" type="button" data-mode="field">野球 野手</button>
        <button class="tab" type="button" data-mode="futsal">フットサル</button>
        <button class="tab" type="button" data-mode="other">その他</button>
      </nav>

      <main class="main-grid">
        <aside class="roster" aria-label="メンバー一覧">
          <div class="filter">全て <span>ASSIES</span></div>
          <div class="member-list" id="memberList"></div>
        </aside>

        <section class="data-panel" aria-live="polite">
          <div class="player-head">
            <div class="name-card">
              <div class="player-name"><span id="playerName">堂良</span><span class="number" id="playerNo">1</span></div>
              <div class="meta-line"><span class="meta-label">所属</span><span class="meta-value">ASSIES</span></div>
              <div class="meta-line"><span class="meta-label">タイプ</span><span class="meta-value" id="playerType">万能型</span></div>
            </div>

            <div class="avatar-card">
              <div class="avatar" id="avatar">
                <div class="cap"></div>
                <div class="head"><span class="eye left"></span><span class="eye right"></span></div>
              </div>
            </div>

            <div class="record-card">
              <div class="record-line"><span class="meta-label">成績</span><span id="recordText">率 .286　12本　48点</span></div>
              <div class="record-line"><span class="meta-label">フォーム</span><span id="formText">スタンダード</span></div>
              <div class="record-line"><span class="meta-label">投打</span><span id="handText">右投右打</span></div>
            </div>
          </div>

          <div class="body-grid">
            <div class="abilities" id="abilityList"></div>
            <div>
              <div class="traits" id="traitsList"></div>
              <div class="note-box" id="noteText">選手能力の詳細です。</div>
            </div>
          </div>
        </section>
      </main>

      <div class="helpbar" id="helpText">メンバーを選択して能力を確認できます。</div>
    </div>

            pitch: { 球速: 92, コントロール: 39, スタミナ: 76, 変化球: 44, メンタル: 69, 牽制: 35 },
            field: { ミート: 42, パワー: 96, 走塁: 60, 送球: 88, 守備範囲: 45, 勝負強さ: 87 },
            futsal: { スピード: 72, ドリブル: 57, パス: 45, シュート: 92, 守備: 41, スタミナ: 78 },
            other: { 継続力: 62, 集合率: 54, 盛り上げ: 96, 冷静さ: 39, 伸びしろ: 99, 運: 91 },
          },
          traits: ["大砲", "三振", "レーザー肩", "ロマン砲", "サプライズ", "爆発力"],
        },
        {
          name: "須々木",
          no: 24,
          type: "守備職人",
          color: "#38d7ff",
          record: "率 .266　6本　38点",
          form: "コンパクト",
          hand: "右投左打",
          abilities: {
            player: { 弾道: 2, ミート: 72, パワー: 58, 走力: 78, 肩力: 73, 守備力: 90, 捕球: 86 },
            pitch: { 球速: 66, コントロール: 84, スタミナ: 67, 変化球: 69, メンタル: 80, 牽制: 78 },
            field: { ミート: 72, パワー: 58, 走塁: 78, 送球: 73, 守備範囲: 90, 勝負強さ: 68 },
            futsal: { スピード: 80, ドリブル: 69, パス: 77, シュート: 58, 守備: 91, スタミナ: 82 },
            other: { 継続力: 86, 集合率: 82, 盛り上げ: 64, 冷静さ: 87, 伸びしろ: 74, 運: 70 },
          },
          traits: ["守備職人", "カバー早い", "送球安定", "対人守備", "堅実", "空気読む"],
        },
      ];

      const modeLabels = {
        player: "選手能力",
        pitch: "野球 投手能力",
        field: "野球 野手能力",
        futsal: "フットサル能力",
        other: "その他能力",
      };

      let currentMember = 0;
      let currentMode = "player";

      const memberList = document.querySelector("#memberList");
      const abilityList = document.querySelector("#abilityList");
      const traitsList = document.querySelector("#traitsList");
      const tabs = document.querySelectorAll(".tab");

      function rank(score) {
        if (score >= 95) return "S";
        if (score >= 80) return "A";
        if (score >= 70) return "B";
        if (score >= 60) return "C";
        if (score >= 50) return "D";
        if (score >= 40) return "E";
        return "F";
      }

      function color(score) {
        if (score >= 80) return "#ed2453";
        if (score >= 70) return "#1fcf4c";
        if (score >= 60) return "#ff9d00";
        if (score >= 50) return "#2b9bff";
        return "#6b7b8a";
      }

      function renderRoster() {
        memberList.innerHTML = members
          .map(
            (member, index) => `
              <button class="member-button ${index === currentMember ? "is-active" : ""}" type="button" data-index="${index}">
                <span>${member.name}</span>
                <small>No.${member.no}</small>
              </button>
            `,
          )
          .join("");

        memberList.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            currentMember = Number(button.dataset.index);
            render();
          });
        });
      }

      function render() {
        const member = members[currentMember];
        const abilities = member.abilities[currentMode];

        document.querySelector("#playerName").textContent = member.name;
        document.querySelector("#playerNo").textContent = member.no;
        document.querySelector("#playerType").textContent = member.type;
        document.querySelector("#recordText").textContent = member.record;
        document.querySelector("#formText").textContent = member.form;
        document.querySelector("#handText").textContent = member.hand;
        document.querySelector("#avatar").style.setProperty("--avatar-color", member.color);
        document.querySelector("#noteText").textContent = `${member.name}の${modeLabels[currentMode]}です。能力値はあとから members 配列で編集できます。`;
        document.querySelector("#helpText").textContent = `${modeLabels[currentMode]}の詳細です。タブとメンバーを切り替えられます。`;

        abilityList.innerHTML = Object.entries(abilities)
          .map(([label, score]) => {
            const scoreNumber = Number(score);
            const displayRank = scoreNumber <= 4 ? "↗" : rank(scoreNumber);
            const displayScore = scoreNumber <= 4 ? scoreNumber : scoreNumber;
            const percent = scoreNumber <= 4 ? `${scoreNumber * 22}%` : `${scoreNumber}%`;
            return `
              <div class="ability-row">
                <span class="ability-label">${label}</span>
                <span class="rank ${displayRank}" style="--rank-color: ${color(scoreNumber)}">${displayRank}</span>
                <span class="bar"><span style="--score: ${percent}; --rank-color: ${color(scoreNumber)}"></span></span>
                <span class="score">${displayScore}</span>
              </div>
            `;
          })
          .join("");

        traitsList.innerHTML = [...member.traits, "", "", "", "", "", ""]
          .slice(0, 16)
          .map((trait, index) => {
            const tone = index % 5 === 0 ? "hot" : index % 4 === 0 ? "gold" : "";
            return `<div class="trait-cell ${trait ? tone : ""}">${trait}</div>`;
          })
          .join("");

        tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.mode === currentMode));
        renderRoster();
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          currentMode = tab.dataset.mode;
          render();
        });
      });

      render();
    </script>
  </body>
</html>
